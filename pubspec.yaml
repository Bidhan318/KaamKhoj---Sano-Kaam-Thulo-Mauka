name: kaamkhoj_v1
description: KaamKhoj - Sano Kaam Thulo Mauka. A local worker discovery platform for Nepal.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_storage: ^11.6.0

  # Maps & Location
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0

  # HTTP
  http: ^1.2.0

  # State Management
  provider: ^6.1.2

  # Chat
  flutter_chat_ui: ^1.6.13

  # Media
  image_picker: ^1.0.7

  # Permissions
  permission_handler: ^11.3.0

  # Biometric / Fingerprint
  local_auth: ^2.1.8

  # Secure credential storage (encrypted keystore)
  flutter_secure_storage: ^9.0.0

  # General preferences (fingerprint enabled flag)
  shared_preferences: ^2.2.2

  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"